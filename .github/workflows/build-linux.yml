name: Build Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      GAME_NAME: hallways
    steps:
      - name: Checkout game repository
        uses: actions/checkout@v4

      - name: Checkout DragonRuby source repository
        uses: actions/checkout@v4
        with:
          repository: darrencauthon/my_dragonruby
          path: dragonruby-source
          token: ${{ secrets.MY_DRAGONRUBY_REPO_TOKEN || github.token }}

      - name: Verify DragonRuby zip exists
        run: |
          if [ ! -f "dragonruby-source/dragonruby-linux.zip" ]; then
            echo "dragonruby-linux.zip not found in darrencauthon/my_dragonruby repo root."
            exit 1
          fi

      - name: Unzip DragonRuby Linux
        run: |
          rm -rf dragonruby-linux
          unzip -q dragonruby-source/dragonruby-linux.zip -d dragonruby-linux

      - name: Copy game code into DragonRuby folder
        run: |
          mkdir -p "dragonruby-linux/${GAME_NAME}"
          rsync -av --exclude='dragonruby-linux' --exclude='dragonruby-source' ./ "dragonruby-linux/${GAME_NAME}"

      - name: Make dragonruby-publish executable
        run: |
          chmod +x dragonruby-linux/dragonruby-publish

      - name: Run dragonruby-publish
        run: |
          cd dragonruby-linux
          ./dragonruby-publish --only-package "${GAME_NAME}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dragonruby-linux/builds/**
            dragonruby-linux/build/**
            dragonruby-linux/dist/**
            dragonruby-linux/releases/**
            builds/**
            build/**
            dist/**
            releases/**
          if-no-files-found: warn
