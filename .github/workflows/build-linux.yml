name: Build Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      GAME_NAME: hallways
      ITCH_IO_USER: darrendoom
      ITCH_IO_GAME: hallways
      BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
    steps:
      - name: Checkout game repository
        uses: actions/checkout@v4

      - name: Checkout DragonRuby source repository
        uses: actions/checkout@v4
        with:
          repository: darrencauthon/my_dragonruby
          path: dragonruby-source
          token: ${{ secrets.MY_DRAGONRUBY_REPO_TOKEN || github.token }}

      - name: Verify DragonRuby zip exists
        run: |
          if [ ! -f "dragonruby-source/dragonruby-linux.zip" ]; then
            echo "dragonruby-linux.zip not found in darrencauthon/my_dragonruby repo root."
            exit 1
          fi

      - name: Unzip DragonRuby Linux
        run: |
          rm -rf dragonruby-linux
          unzip -q dragonruby-source/dragonruby-linux.zip -d dragonruby-linux

      - name: Install headless display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run DragonRuby tests
        run: |
          chmod +x dragonruby-linux/dragonruby
          set +e
          cd dragonruby-linux
          xvfb-run -a ./dragonruby "${GITHUB_WORKSPACE}" --test app/test_runner.rb > "${GITHUB_WORKSPACE}/test-transcript.txt" 2>&1
          DRAGONRUBY_EXIT=$?
          set -e

          cat "${GITHUB_WORKSPACE}/test-transcript.txt"

          if [ "$DRAGONRUBY_EXIT" -ne 0 ]; then
            echo "DragonRuby test command failed with exit code ${DRAGONRUBY_EXIT}."
            exit 1
          fi

          FAILED_LINE="$(grep -Eo '[0-9]+ test\(s\) failed\.' "${GITHUB_WORKSPACE}/test-transcript.txt" | tail -n 1 || true)"
          if [ -z "$FAILED_LINE" ]; then
            echo "Could not find failed-test summary in test-transcript.txt."
            exit 1
          fi

          FAILED_COUNT="$(echo "$FAILED_LINE" | cut -d ' ' -f 1)"
          if [ -z "$FAILED_COUNT" ]; then
            echo "Could not parse failed count from transcript summary: $FAILED_LINE"
            exit 1
          fi

          if [ "$FAILED_COUNT" != "0" ]; then
            echo "Test failures detected (failed=${FAILED_COUNT})."
            exit 1
          fi

          if [ -f "${GITHUB_WORKSPACE}/errors/last.txt" ]; then
            echo "errors/last.txt detected after test run:"
            cat "${GITHUB_WORKSPACE}/errors/last.txt"
            exit 1
          fi

      - name: Copy game code into DragonRuby folder
        run: |
          mkdir -p "dragonruby-linux/${GAME_NAME}"
          rsync -av \
            --exclude='dragonruby-linux' \
            --exclude='dragonruby-source' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.ruby-lsp' \
            --exclude='errors' \
            --exclude='docs' \
            --exclude='*test*.rb' \
            --exclude='AGENTS.md' \
            --exclude='README.md' \
            ./ "dragonruby-linux/${GAME_NAME}"

      - name: Ensure DragonRuby temp directories are writable
        run: |
          chmod -R u+rwX dragonruby-linux/.dragonruby
          mkdir -p dragonruby-linux/.dragonruby
          chmod -R u+rwX dragonruby-linux

      - name: Ensure valid metadata icon exists
        run: |
          ICON_PATH="dragonruby-linux/${GAME_NAME}/metadata/icon.png"
          mkdir -p "dragonruby-linux/${GAME_NAME}/metadata"

          if [ -f "$ICON_PATH" ]; then
            PNG_SIG="$(xxd -p -l 8 "$ICON_PATH" || true)"
          else
            PNG_SIG=""
          fi

          if [ "$PNG_SIG" != "89504e470d0a1a0a" ]; then
            echo "Using fallback icon for publish: $ICON_PATH"
            cp dragonruby-linux/dragonruby.png "$ICON_PATH"
          fi

      - name: Make dragonruby-publish executable
        run: |
          chmod +x dragonruby-linux/dragonruby-publish

      - name: Run dragonruby-publish
        run: |
          cd dragonruby-linux
          ./dragonruby-publish --only-package "${GAME_NAME}"

      - name: Read game version
        run: |
          GAME_VERSION="$(grep '^version=' "dragonruby-linux/${GAME_NAME}/metadata/game_metadata.txt" | head -n 1 | cut -d '=' -f 2)"
          if [ -z "$GAME_VERSION" ]; then
            echo "Could not determine game version from metadata/game_metadata.txt"
            exit 1
          fi
          echo "GAME_VERSION=$GAME_VERSION" >> "$GITHUB_ENV"

      - name: Install butler
        if: ${{ env.BUTLER_API_KEY != '' }}
        run: |
          set -e
          BUTLER_URLS=(
            "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
            "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default"
          )

          DOWNLOADED=0
          for URL in "${BUTLER_URLS[@]}"; do
            echo "Trying butler download URL: $URL"
            if curl --fail --location --retry 5 --retry-delay 2 --retry-all-errors -o butler.zip "$URL"; then
              DOWNLOADED=1
              break
            fi
          done

          if [ "$DOWNLOADED" -ne 1 ]; then
            echo "Failed to download butler from all known URLs."
            exit 1
          fi

          unzip -q butler.zip -d butler
          BUTLER_BIN="$(find butler -type f -name butler | head -n 1)"
          if [ -z "$BUTLER_BIN" ]; then
            echo "Could not locate butler binary after unzip."
            exit 1
          fi
          chmod +x "$BUTLER_BIN"
          ./butler/butler -V

      - name: Push builds to itch.io
        if: ${{ env.BUTLER_API_KEY != '' }}
        run: |
          shopt -s nullglob
          BUILD_ZIPS=(dragonruby-linux/builds/${GAME_NAME}-*.zip)
          if [ ${#BUILD_ZIPS[@]} -eq 0 ]; then
            echo "No build zip files found in dragonruby-linux/builds"
            exit 1
          fi

          for ZIP_PATH in "${BUILD_ZIPS[@]}"; do
            ZIP_NAME="$(basename "$ZIP_PATH")"
            CHANNEL="${ZIP_NAME#${GAME_NAME}-}"
            CHANNEL="${CHANNEL%-${GAME_VERSION}.zip}"
            echo "Pushing $ZIP_NAME to ${ITCH_IO_USER}/${ITCH_IO_GAME}:${CHANNEL}"
            ./butler/butler push "$ZIP_PATH" "${ITCH_IO_USER}/${ITCH_IO_GAME}:${CHANNEL}"
          done

          HTML5_DIRS=(dragonruby-linux/builds/${GAME_NAME}-html5*)
          for HTML5_PATH in "${HTML5_DIRS[@]}"; do
            if [ -d "$HTML5_PATH" ]; then
              echo "Pushing HTML5 directory $(basename "$HTML5_PATH") to ${ITCH_IO_USER}/${ITCH_IO_GAME}:html5"
              ./butler/butler push "$HTML5_PATH" "${ITCH_IO_USER}/${ITCH_IO_GAME}:html5"
              break
            fi
          done

      - name: Upload build artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-debug
          retention-days: 2
          path: |
            dragonruby-linux/builds/**
            dragonruby-linux/build/**
            dragonruby-linux/dist/**
            dragonruby-linux/releases/**
            test-transcript.txt
            errors/last.txt
          if-no-files-found: warn
